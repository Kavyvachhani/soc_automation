name: Compliance Evidence Collection

# Triggers for SOC 2 evidence collection
on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  collect-evidence:
    name: Collect SOC 2 Evidence Snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 fpdf2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Create Evidence Directory
        run: mkdir -p /tmp/evidence /tmp/reports

      - name: Collect AWS Evidence
        run: |
          python scripts/collect_aws_evidence.py \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --project "${{ secrets.PROJECT_NAME }}" \
            --output /tmp/evidence \
            --upload
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          
      - name: Collect GitHub Evidence
        run: |
          python scripts/collect_github_evidence.py \
            --repo "${{ github.repository }}" \
            --branch "main" \
            --output /tmp/evidence \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Collect Zoho HR Evidence
        run: |
          python scripts/collect_zoho_evidence.py \
            --output /tmp/evidence \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload
        env:
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          
      - name: Run Compliance Engine
        run: |
          python scripts/compliance_engine.py \
            --evidence-dir /tmp/evidence \
            --output /tmp/reports \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload

      - name: Generate Compliance PDF
        run: |
          python scripts/generate_compliance_pdf.py \
            --summary /tmp/reports/compliance_summary_latest.json \
            --output /tmp/reports/soc2_compliance_report.pdf \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload
            
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soc2-compliance-evidence
          path: |
            /tmp/evidence/
            /tmp/reports/
          retention-days: 90
