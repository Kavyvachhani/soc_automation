name: Compliance Evidence Collection

# Weekly SOC 2 evidence snapshots + on-demand
on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-evidence:
    name: Collect SOC 2 Evidence Snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Verify S3 vault configuration
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.S3_BUCKET }}"
          echo "=== Bucket versioning ==="
          aws s3api get-bucket-versioning --bucket "$BUCKET" --no-cli-pager

          echo "=== Bucket encryption ==="
          aws s3api get-bucket-encryption --bucket "$BUCKET" --no-cli-pager

          echo "=== Public access block ==="
          aws s3api get-public-access-block --bucket "$BUCKET" --no-cli-pager

          echo "=== Bucket policy ==="
          aws s3api get-bucket-policy --bucket "$BUCKET" \
            --output text --no-cli-pager || echo "No bucket policy set"

      - name: Snapshot IAM role policies
        run: |
          set -euo pipefail
          ROLE_NAME="${{ secrets.PROJECT_NAME }}-github-actions"
          echo "=== Attached managed policies for $ROLE_NAME ==="
          aws iam list-attached-role-policies \
            --role-name "$ROLE_NAME" --no-cli-pager || echo "Role not found"

          echo "=== Inline policies ==="
          aws iam list-role-policies \
            --role-name "$ROLE_NAME" --no-cli-pager || echo "Role not found"

      - name: Snapshot Lambda configurations
        run: |
          set -euo pipefail
          PREFIX="${{ secrets.PROJECT_NAME }}"
          for FN in offer_processor signed_processor approval_handler; do
            echo "=== ${PREFIX}-${FN} ==="
            aws lambda get-function-configuration \
              --function-name "${PREFIX}-${FN}" \
              --query '{Runtime:Runtime,MemorySize:MemorySize,Timeout:Timeout,LastModified:LastModified}' \
              --output table \
              --no-cli-pager || echo "Function not found"
          done

      - name: Upload snapshot to S3 vault
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +%Y-%m-%dT%H%M%SZ)

          cat > /tmp/snapshot.json << EOF
          {
            "timestamp": "${TIMESTAMP}",
            "collector": "github-actions",
            "run_id": "${{ github.run_id }}",
            "checks": [
              "s3-versioning", "s3-encryption", "s3-public-access-block",
              "s3-tls-policy", "iam-role-policies", "lambda-configuration"
            ],
            "status": "collected"
          }
          EOF

          aws s3 cp /tmp/snapshot.json \
            "s3://${{ secrets.S3_BUCKET }}/compliance-snapshots/${TIMESTAMP}.json" \
            --content-type "application/json"

          echo "Snapshot uploaded: compliance-snapshots/${TIMESTAMP}.json"
