name: attest-non-tech-auditor

# Triggers for SOC 2 evidence collection
on:
  schedule:
    - cron: "0 0 * * *"   # Every night at 00:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  collect-evidence:
    name: Collect SOC 2 Evidence Snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 fpdf2 requests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Create Evidence Directory
        run: mkdir -p /tmp/evidence /tmp/reports

      - name: Collect Zoho HR Evidence (NDAs, Training, Background Checks)
        run: |
          python scripts/collect_zoho_evidence.py \
            --output /tmp/evidence \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload
        env:
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}

      - name: Run Compliance Engine
        run: |
          python scripts/compliance_engine.py \
            --evidence-dir /tmp/evidence \
            --output /tmp/reports \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload
        env:
          DEMO_MODE: "true"

      - name: Generate Final SOC 2 Compliance PDF
        run: |
          python scripts/generate_compliance_pdf.py \
            --summary /tmp/reports/compliance_summary_latest.json \
            --output /tmp/reports/soc2_compliance_report.pdf \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: non-tech-evidence-${{ github.run_id }}
          path: |
            /tmp/evidence/
            /tmp/reports/
          retention-days: 90

      - name: Create Urgent Incident Alert
        if: failure()
        run: |
          gh issue create \
            --title "🚨 URGENT: SOC 2 Compliance / Security Failure" \
            --body "The automated nightly SOC 2 compliance engine has detected a critical failure or missing evidence. Please review the attached workflow logs and reports in the S3 vault immediately." \
            --assignee "@me"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_GITHUB_TOKEN }}

  enforce-soc2-change-management:
    name: SOC 2 Change Management Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify PR Description for Ticket References
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Not a pull request. Skipping PR ticket check."
            exit 0
          fi
          PR_BODY="${{ github.event.pull_request.body }}"
          if [[ ! "$PR_BODY" =~ (JIRA|TICKET|ISSUE)-[0-9]+ ]]; then
            echo "::warning::SOC 2 Compliance Failure: All PRs must reference a valid issue ticket (e.g., TICKET-123) in the description for change management tracking."
            exit 0
          fi
          echo "Ticket reference found. Change management tracking verified."

      - name: Restrict Workflow Modifications
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Not a pull request. Skipping workflow modifications check."
            exit 0
          fi
          # Fetch the list of changed files
          URL="https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files"
          FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $URL | jq -r '.[].filename')
          
          for FILE in $FILES; do
            if [[ "$FILE" == .github/workflows/* ]]; then
              echo "::warning::Workflow modification detected in $FILE."
              # In a real environment, you might check if the author is in an 'approvers' team
              # using the GitHub API, or require a specific required review.
              # For this automated check, we just flag it.
              echo "Workflow files require explicit Tech Lead approval per SOC 2 guidelines."
            fi
          done

      - name: Run Static Security Analysis
        run: |
          echo "Running lightweight static analysis (bandit) on Python code..."
          pip install --quiet bandit
          bandit -r scripts/ lambda/ portal/ -ll -q || echo "::warning::Static analysis found potential issues. Please review."
          echo "Static analysis complete."
