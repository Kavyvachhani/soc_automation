name: attest-technical-compliance

# Triggers for SOC 2 evidence collection
on:
  schedule:
    - cron: "0 0 * * *"   # Every night at 00:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  collect-evidence:
    name: Collect SOC 2 Evidence Snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 fpdf2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Create Evidence Directory
        run: mkdir -p /tmp/evidence /tmp/reports

      - name: Collect AWS Evidence
        run: |
          python scripts/collect_aws_evidence.py \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --project "${{ secrets.PROJECT_NAME }}" \
            --output /tmp/evidence \
            --upload
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          
      - name: Collect GitHub Evidence
        run: |
          python scripts/collect_github_evidence.py \
            --repo "${{ github.repository }}" \
            --branch "main" \
            --output /tmp/evidence \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_GITHUB_TOKEN }}
          


      - name: Run Shannon AI Pentest
        run: |
          python scripts/ai_pentest.py \
            --scan-dirs scripts/ \
            --output /tmp/evidence/ai_evidence_latest.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          

      - name: Run Compliance Engine
        run: |
          python scripts/compliance_engine.py \
            --evidence-dir /tmp/evidence \
            --output /tmp/reports \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload

      - name: Generate Compliance PDF
        if: always()
        run: |
          python scripts/generate_compliance_pdf.py \
            --summary /tmp/reports/compliance_summary_latest.json \
            --output /tmp/reports/soc2_compliance_report.pdf \
            --bucket "${{ secrets.S3_BUCKET }}" \
            --upload
            
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soc2-compliance-evidence
          path: |
            /tmp/evidence/
            /tmp/reports/
          retention-days: 90

      - name: Create Urgent Incident Alert
        if: failure()
        run: |
          gh issue create \
            --title "🚨 URGENT: SOC 2 Compliance / Security Failure" \
            --body "The automated nightly SOC 2 compliance engine has detected a critical failure or missing evidence. Please review the attached workflow logs and reports in the S3 vault immediately." \
            --assignee "@me"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_GITHUB_TOKEN }}
