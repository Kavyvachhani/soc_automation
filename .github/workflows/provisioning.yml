name: Provisioning — Approval-Gated Access Grant

# Triggered by:
#   1. repository_dispatch  — fired by signed_processor Lambda after NDA is signed
#   2. workflow_dispatch    — manual trigger for re-runs / testing
on:
  repository_dispatch:
    types: [nda-signed]
  workflow_dispatch:
    inputs:
      emp_id:
        description: "Employee ID (e.g. EMP-ABCD1234)"
        required: true
        type: string

permissions:
  contents: read
  issues:   write

jobs:
  provision:
    name: Provision Access
    runs-on: ubuntu-latest

    # ── APPROVAL GATE ─────────────────────────────────────────────────────────
    # The "provisioning" Environment must have Kavyvachhani as required reviewer.
    # NOTHING below runs until the reviewer clicks Approve in the Actions UI.
    environment: provisioning

    env:
      EMP_ID: ${{ github.event.client_payload.emp_id || inputs.emp_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Install Python deps (for inline scripts)
        run: pip install --quiet boto3 pyyaml fpdf2

      # ── Step 1: Read or create approval token ─────────────────────────────
      - name: Prepare approval token
        id: token
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.S3_BUCKET }}"
          EMP_ID="${{ env.EMP_ID }}"
          PENDING_KEY="employees/${EMP_ID}/pending-approval.json"

          # Try to read existing token
          TOKEN=$(aws s3 cp "s3://${BUCKET}/${PENDING_KEY}" - 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" \
            || echo "")

          # If no token exists yet, create one (manual dispatch case)
          if [ -z "$TOKEN" ]; then
            echo "No pending-approval.json found — creating synthetic one"
            TOKEN=$(python3 -c "import uuid; print(str(uuid.uuid4()))")
            python3 << PYEOF
          import json, boto3, datetime
          s3 = boto3.client('s3', region_name='${{ secrets.AWS_REGION }}')
          data = {
              'emp_id':     '$EMP_ID',
              'token':      '$TOKEN',
              'status':     'pending',
              'created_at': datetime.datetime.utcnow().isoformat() + 'Z'
          }
          s3.put_object(
              Bucket='$BUCKET',
              Key='$PENDING_KEY',
              Body=json.dumps(data, indent=2).encode(),
              ContentType='application/json'
          )
          print('Created pending-approval.json')
          PYEOF
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "Token ready: ${TOKEN:0:8}..."

      # ── Step 2: Invoke approval_handler Lambda ────────────────────────────
      - name: Invoke approval_handler Lambda
        id: invoke_approval
        run: |
          set -euo pipefail
          FUNCTION_NAME="${{ secrets.PROJECT_NAME }}-approval_handler"
          EMP_ID="${{ env.EMP_ID }}"
          TOKEN="${{ steps.token.outputs.token }}"
          APPROVER="${{ github.actor }}"

          echo "Function : $FUNCTION_NAME"
          echo "EMP_ID   : $EMP_ID"
          echo "Approver : $APPROVER"

          PAYLOAD=$(python3 << PYEOF
          import json
          event = {
              "queryStringParameters": {
                  "token":    "$TOKEN",
                  "emp_id":   "$EMP_ID",
                  "action":   "approve",
                  "approver": "$APPROVER"
              },
              "requestContext": {"http": {"method": "GET"}}
          }
          print(json.dumps(event))
          PYEOF
          )

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            --no-cli-pager \
            /tmp/approval-response.json

          echo "=== Lambda Response ==="
          cat /tmp/approval-response.json

          python3 << 'PYEOF'
          import json, sys
          r = json.load(open('/tmp/approval-response.json'))
          sc = r.get('statusCode', 200)
          body = r.get('body', '')
          if sc not in (200, 201):
              print(f'ERROR: statusCode={sc}')
              sys.exit(1)
          if 'Internal error' in body or 'errorMessage' in body:
              print(f'ERROR: Lambda body contains error')
              sys.exit(1)
          print(f'Lambda completed OK — statusCode={sc}')
          PYEOF

      # ── Step 3: Fallback inline provisioning if Lambda fails ──────────────
      - name: Fallback — inline provisioning
        if: failure() && steps.invoke_approval.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p "data/employees/${{ env.EMP_ID }}"
          aws s3 sync \
            "s3://${{ secrets.S3_BUCKET }}/employees/${{ env.EMP_ID }}/" \
            "data/employees/${{ env.EMP_ID }}/"

          ls -la "data/employees/${{ env.EMP_ID }}/"

          REAL_FLAG="--real"
          if [ "${{ secrets.ENABLE_REAL_PROVISIONING }}" = "false" ]; then
            REAL_FLAG=""
          fi

          python3 scripts/provision.py "${{ env.EMP_ID }}" \
            --approver "${{ github.actor }}" \
            --data-dir "./data" \
            $REAL_FLAG

          aws s3 sync \
            "data/employees/${{ env.EMP_ID }}/" \
            "s3://${{ secrets.S3_BUCKET }}/employees/${{ env.EMP_ID }}/"

      # ── Step 4: Verify evidence files in S3 ──────────────────────────────
      - name: Verify evidence in S3
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.S3_BUCKET }}"
          PREFIX="employees/${{ env.EMP_ID }}"
          echo "Checking evidence for ${{ env.EMP_ID }} ..."
          for KEY in access-granted.csv aws-access-credentials.csv evidence-index.json; do
            aws s3api head-object \
              --bucket "$BUCKET" \
              --key "${PREFIX}/${KEY}" \
              --no-cli-pager \
              && echo "  OK  ${KEY}" \
              || echo "  WARN: ${KEY} not found yet"
          done

      # ── Step 5: Create GitHub issue as audit record ───────────────────────
      - name: Create audit issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          EMP_NAME="Unknown"
          ROLE="unknown"
          TMPFILE=$(mktemp)

          if aws s3 cp \
            "s3://${{ secrets.S3_BUCKET }}/employees/${{ env.EMP_ID }}/employee.json" \
            "$TMPFILE" 2>/dev/null; then
            EMP_NAME=$(python3 -c "import json; d=json.load(open('$TMPFILE')); print(d.get('name','Unknown'))")
            ROLE=$(python3 -c "import json; d=json.load(open('$TMPFILE')); print('developer' if d.get('experience_level')=='experienced' else 'fresher')")
          fi

          gh issue create \
            --title "Access Provisioned: ${EMP_NAME} (${{ env.EMP_ID }})" \
            --body "## SOC 2 Onboarding Complete

          | Field | Value |
          |---|---|
          | **Employee** | ${EMP_NAME} |
          | **Employee ID** | ${{ env.EMP_ID }} |
          | **Role** | ${ROLE} |
          | **Approved by** | @${{ github.actor }} |
          | **Provisioned at** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |
          | **Run** | [Actions #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ### Evidence stored in S3 vault
          - access-granted.csv
          - aws-access-credentials.csv
          - onboarding-report.pdf
          - combined-evidence.pdf
          - evidence-index.json" \
            || echo "Issue creation skipped (labels may be missing)"
