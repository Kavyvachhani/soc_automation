name: Zoho Compliance Sync

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  sync_zoho_evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install --quiet boto3

      - name: Run Zoho Compliance Sync
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          python scripts/zoho_sync.py

      - name: Generate Alert on Missing Evidence
        if: failure()
        run: |
          echo "::error::Zoho Compliance Sync Failed! Evidence collection is incomplete."
          # E.g., send slack notification or trigger PagerDuty
          exit 1
