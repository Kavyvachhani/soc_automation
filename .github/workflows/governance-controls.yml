name: Governance & Compliance Controls

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

jobs:
  enforce-soc2-change-management:
    name: SOC 2 Change Management Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify PR Description for Ticket References
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if [[ ! "$PR_BODY" =~ (JIRA|TICKET|ISSUE)-[0-9]+ ]]; then
            echo "::error::SOC 2 Compliance Failure: All PRs must reference a valid issue ticket (e.g., TICKET-123) in the description for change management tracking."
            exit 1
          fi
          echo "Ticket reference found. Change management tracking verified."

      - name: Restrict Workflow Modifications
        run: |
          # Fetch the list of changed files
          URL="https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files"
          FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $URL | jq -r '.[].filename')
          
          for FILE in $FILES; do
            if [[ "$FILE" == .github/workflows/* ]]; then
              echo "::warning::Workflow modification detected in $FILE."
              # In a real environment, you might check if the author is in an 'approvers' team
              # using the GitHub API, or require a specific required review.
              # For this automated check, we just flag it.
              echo "Workflow files require explicit Tech Lead approval per SOC 2 guidelines."
            fi
          done

      - name: Run Static Security Analysis
        run: |
          echo "Running lightweight static analysis (bandit) on Python code..."
          pip install --quiet bandit
          bandit -r scripts/ lambda/ portal/ -ll -q || echo "::warning::Static analysis found potential issues. Please review."
          echo "Static analysis complete."
